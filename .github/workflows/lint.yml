name: Lint

on:
  push:
    branches: [main]
  pull_request:

jobs:
  shellcheck:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
      - run: grep -rl '^#!.*/\(sh\|bash\)' bin | xargs shellcheck install.sh

  toml:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
      - uses: uncenter/setup-taplo@v1
      - run: taplo check config/mise/config.toml
