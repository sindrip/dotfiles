name: Nix

on:
  push:
    branches: [main]
  pull_request:
  workflow_dispatch:

jobs:
  check:
    runs-on: ubuntu-latest
    outputs:
      targets: ${{ steps.probe.outputs.targets }}
    steps:
      - uses: actions/checkout@v7
      - uses: cachix/install-nix-action@v31
        with:
          extra_nix_config: |
            extra-substituters = https://sindrip.cachix.org
            extra-trusted-public-keys = sindrip.cachix.org-1:tni1LcPdMGxgmv3ZseA3ULu3oMwR5iz1/0p9ibhBPHE=
      - id: probe
        env:
          PACKAGES: .#packages.aarch64-darwin
        run: |
          targets=$(nix run nixpkgs#nix-eval-jobs -- --check-cache-status --flake "$PACKAGES" \
            | jq -rn --arg p "$PACKAGES" \
                '[inputs | select(.cacheStatus == "notBuilt")] | unique_by(.drvPath) | map("\($p).\(.attr)") | join(" ")')
          echo "targets=$targets" >> "$GITHUB_OUTPUT"

  build:
    needs: check
    if: needs.check.outputs.targets != ''
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v7
      - uses: cachix/install-nix-action@v31
      - uses: cachix/cachix-action@v17
        with:
          name: sindrip
          authToken: ${{ secrets.CACHIX_AUTH_TOKEN }}
      - run: nix build -L ${{ needs.check.outputs.targets }}
