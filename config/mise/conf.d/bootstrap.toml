[settings]
experimental = true

[bootstrap.macos.keyboard]
key_repeat = 2
initial_key_repeat = 15

[bootstrap.macos.dock]
autohide = true

[bootstrap.macos.trackpad]
tap_to_click = true

[bootstrap.macos.defaults.NSGlobalDomain]
NSAutomaticCapitalizationEnabled = 0
NSAutomaticDashSubstitutionEnabled = 0
NSAutomaticPeriodSubstitutionEnabled = 0
NSAutomaticQuoteSubstitutionEnabled = 0
NSAutomaticSpellingCorrectionEnabled = 0

[bootstrap.macos.defaults."com.apple.dock"]
"autohide-delay" = 0
"autohide-time-modifier" = 0
"mru-spaces" = 0
"show-recents" = 0

[bootstrap.macos.defaults."com.apple.finder"]
FXPreferredViewStyle = "Nlsv"

[bootstrap.macos.defaults."com.apple.AppleMultitouchTrackpad"]
TrackpadThreeFingerDrag = 1

[bootstrap.macos.defaults."com.apple.HIToolbox"]
AppleFnUsageType = 0

[bootstrap.hooks.pre-defaults]
run = """
# Ghostty: unbind "Hide Ghostty" (Cmd+H)
defaults write com.mitchellh.ghostty NSUserKeyEquivalents -dict-add 'Hide Ghostty' '\\0'

# Disable keyboard shortcuts (dict-add values, can't use [bootstrap.macos.defaults])
hotkeys="com.apple.symbolichotkeys AppleSymbolicHotKeys"

# Ctrl+Space — previous input source
defaults write $hotkeys -dict-add 60 '{enabled = 0; value = {parameters = (32, 49, 262144); type = standard;};}'

# Ctrl+Option+Space — next input source
defaults write $hotkeys -dict-add 61 '{enabled = 0; value = {parameters = (32, 49, 786432); type = standard;};}'

# Cmd+Space — Spotlight (using Raycast)
defaults write $hotkeys -dict-add 64 '{enabled = 0; value = {parameters = (32, 49, 1048576); type = standard;};}'

# Cmd+Option+Space — Finder search
defaults write $hotkeys -dict-add 65 '{enabled = 0; value = {parameters = (32, 49, 1572864); type = standard;};}'

"""
