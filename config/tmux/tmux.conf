set-option -g prefix C-Space
unbind-key C-b
bind-key C-Space send-prefix

set-option -sg escape-time 0
set-option -g focus-events on
set-option -g mouse on

# Terminal features (Ghostty)
set -g default-terminal "tmux-256color"
set -as terminal-features ",xterm-ghostty:RGB:usstyle:hyperlinks:strikethrough:extkeys"
set -g allow-passthrough on
set -s extended-keys on
set -s extended-keys-format csi-u

set-option -g base-index 1
set-option -g pane-base-index 1
set-option -g renumber-windows on
set-option -g automatic-rename on
set-option -g automatic-rename-format "#{pane_current_command}"
set-option -g set-titles on
set-option -g set-titles-string "#S"
set-option -g mode-keys vi

bind-key x kill-pane
bind-key r source-file "~/.config/tmux/tmux.conf" \; display-message "tmux.conf reloaded"
bind-key C-s display-popup -E -w 80% -h 70% -d '#{pane_current_path}' -T 'Sesh' tv sesh
bind-key C-l run-shell "sesh last"
bind-key C-g run-shell "sesh connect --root $(pwd)"

bind-key -n M-1 select-window -t 1
bind-key -n M-2 select-window -t 2
bind-key -n M-3 select-window -t 3
bind-key -n M-4 select-window -t 4
bind-key -n M-5 select-window -t 5
bind-key -n M-6 select-window -t 6
bind-key -n M-7 select-window -t 7
bind-key -n M-8 select-window -t 8
bind-key -n M-9 select-window -t 9
bind-key -n M-0 select-window -t 10

bind-key -n M-Enter split-window -h -c "#{pane_current_path}"
bind-key -n M-S-Enter split-window -v -c "#{pane_current_path}"
bind-key -n M-BSpace confirm-before -p "kill-pane #P? (y/n)" kill-pane

bind-key -n M-h select-pane -L
bind-key -n M-j select-pane -D
bind-key -n M-k select-pane -U
bind-key -n M-l select-pane -R

bind-key -n M-H resize-pane -L 2
bind-key -n M-J resize-pane -D 2
bind-key -n M-K resize-pane -U 2
bind-key -n M-L resize-pane -R 2

# Plugins
set -g @plugin 'tmux-plugins/tpm'

set -g @catppuccin_flavor 'frappe'
set -g @catppuccin_window_status_style "rounded"
set -g @catppuccin_window_flags "icon"
set -g @catppuccin_window_text "#W"
set -g @catppuccin_window_current_text "#W"
set -g @catppuccin_date_time_text " %H:%M"
set -g @plugin 'catppuccin/tmux'

if "test ! -d $TMUX_PLUGIN_MANAGER_PATH/tpm" \
   "run 'git clone https://github.com/tmux-plugins/tpm $TMUX_PLUGIN_MANAGER_PATH/tpm && $TMUX_PLUGIN_MANAGER_PATH/tpm/bin/install_plugins'"

run '$TMUX_PLUGIN_MANAGER_PATH/tpm/tpm'

# Dim inactive panes
set -g window-style 'bg=#{@thm_mantle}'
set -g window-active-style 'bg=terminal'

# Statusline
set -g status-right-length 100
set -g status-left-length 100
set -g status-left ""
set -g status-right "#{E:@catppuccin_status_session}"
