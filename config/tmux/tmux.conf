set-option -g prefix C-Space
unbind-key C-b
bind-key C-Space send-prefix

set-option -sg escape-time 0
set-option -g focus-events on
set-option -g mouse on

# Terminal features (Ghostty)
set -g default-terminal "tmux-256color"
set -as terminal-features ",xterm-ghostty:RGB:usstyle:hyperlinks:strikethrough"
set -g allow-passthrough on
set -g extended-keys on

set-option -g base-index 1
set-option -g pane-base-index 1
set-option -g renumber-windows on
set-option -g mode-keys vi

bind-key x kill-pane
bind-key C-r source-file "~/.config/tmux/tmux.conf" \; display-message "tmux.conf reloaded"

bind-key -n M-1 select-window -t 1
bind-key -n M-2 select-window -t 2
bind-key -n M-3 select-window -t 3
bind-key -n M-4 select-window -t 4
bind-key -n M-5 select-window -t 5
bind-key -n M-6 select-window -t 6
bind-key -n M-7 select-window -t 7
bind-key -n M-8 select-window -t 8
bind-key -n M-9 select-window -t 9
bind-key -n M-0 select-window -t 10

# Plugins
set -g @plugin 'tmux-plugins/tpm'
set -g @tmux-nvim-navigator-left  'C-h'
set -g @tmux-nvim-navigator-down  'C-j'
set -g @tmux-nvim-navigator-up    'C-k'
set -g @tmux-nvim-navigator-right 'C-l'
set -g @plugin 'sindrip/tmux-nvim-navigator'

set -g @catppuccin_flavor 'frappe'
set -g @catppuccin_window_status_style "rounded"
set -g @catppuccin_window_text "#W"
set -g @catppuccin_window_current_text "#W"
set -g @catppuccin_date_time_text " %H:%M"
# set -g @catppuccin_status_left_separator ""
# set -g @catppuccin_status_right_separator ""
set -g @plugin 'catppuccin/tmux'

if "test ! -d $TMUX_PLUGIN_MANAGER_PATH/tpm" \
   "run 'git clone https://github.com/tmux-plugins/tpm $TMUX_PLUGIN_MANAGER_PATH/tpm && $TMUX_PLUGIN_MANAGER_PATH/tpm/bin/install_plugins'"

run '$TMUX_PLUGIN_MANAGER_PATH/tpm/tpm'

# Dim inactive panes
set -g window-style 'bg=#{@thm_mantle}'
set -g window-active-style 'bg=terminal'

# Statusline
set -g status-right-length 100
set -g status-left-length 100
set -g status-left ""
# set -ag status-right "#{E:@catppuccin_status_date_time}"
set -g status-right "#{E:@catppuccin_status_session}"

